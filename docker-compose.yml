version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./hls:/app/hls
      - ./uploads:/app/uploads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
